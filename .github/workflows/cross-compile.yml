name: Cross-compile + Package

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt check
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --verbose

  cross-build:
    name: cross ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use-cross: false
          - target: aarch64-unknown-linux-musl
            use-cross: true
          - target: armv7-unknown-linux-musleabihf
            use-cross: true
          - target: mips-unknown-linux-musl
            use-cross: false
            needs-build-std: true
            musl-tc: mips-linux-muslsf
          - target: mipsel-unknown-linux-musl
            use-cross: false
            needs-build-std: true
            musl-tc: mipsel-linux-muslsf
    steps:
      - uses: actions/checkout@v4

      # --- x86_64: native musl-gcc ---
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.use-cross == false && matrix.needs-build-std != true
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (musl-gcc)
        if: matrix.use-cross == false && matrix.needs-build-std != true
        run: cargo build --release --target ${{ matrix.target }}

      # --- ARM: cross (Docker) ---
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.use-cross == true

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross

      - name: Cross build (Docker)
        if: matrix.use-cross == true
        run: cross build --release --target ${{ matrix.target }}

      # --- MIPS: musl.cc mirror + nightly build-std (production pattern from vnt-dev/vnt) ---
      - name: Install MIPS musl cross-compiler
        if: matrix.needs-build-std == true
        run: |
          wget -q "https://github.com/rustp2p/musl-cross/releases/download/0.0.1/${{ matrix.musl-tc }}-cross.tgz" -O /tmp/musl.tgz
          tar xf /tmp/musl.tgz -C /opt/
          cd /opt/${{ matrix.musl-tc }}-cross/lib/gcc/${{ matrix.musl-tc }}/11.2.1
          cp libgcc_eh.a libunwind.a

      - uses: dtolnay/rust-toolchain@nightly
        if: matrix.needs-build-std == true
        with:
          components: rust-src

      - name: Build MIPS (cargo +nightly, build-std)
        if: matrix.needs-build-std == true
        run: |
          TC=/opt/${{ matrix.musl-tc }}-cross
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          export CC_${TARGET_UPPER}="$TC/bin/${{ matrix.musl-tc }}-gcc"
          export CARGO_TARGET_${TARGET_UPPER}_LINKER="$TC/bin/${{ matrix.musl-tc }}-gcc"
          export AR_${TARGET_UPPER}="$TC/bin/${{ matrix.musl-tc }}-ar"
          export PATH="$TC/bin:$PATH"
          cargo +nightly update -p cdk -p cdk-common
          cargo +nightly build -Z build-std --release --target ${{ matrix.target }}

      - name: Binary size
        run: |
          BIN=target/${{ matrix.target }}/release/tollgate-module-basic-rust
          ls -lh "$BIN"
          strip "$BIN" 2>/dev/null || true
          ls -lh "$BIN"
          echo "SIZE_BYTES=$(stat -c %s "$BIN")" >> $GITHUB_ENV

      - name: Stage binary for packaging
        run: |
          mkdir -p openwrt
          cp target/${{ matrix.target }}/release/tollgate-module-basic-rust \
             openwrt/tollgate-module-basic-rust-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: tollgate-${{ matrix.target }}
          path: openwrt/tollgate-module-basic-rust-${{ matrix.target }}
          if-no-files-found: error
